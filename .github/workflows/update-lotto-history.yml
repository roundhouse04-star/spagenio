name: 로또 회차 데이터 자동 갱신

# 매주 토요일 추첨(KST 20:35) 직후 실행
# - cron 은 UTC 기준이라 14:00 UTC = 23:00 KST
# - workflow_dispatch 로 GitHub UI 에서 수동 실행도 가능
on:
  schedule:
    - cron: '0 14 * * 6'
  workflow_dispatch:

permissions:
  contents: write   # JSON 갱신 후 자동 커밋/푸시 권한

jobs:
  update-history:
    name: lotto.oot.kr → assets/lotto-history.json 갱신
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 리포 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 22 셋업
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 누락 회차 가져오기
        working-directory: lotto-app
        run: |
          echo "현재 보유 회차:"
          node -e "const d=require('./assets/lotto-history.json');const k=Object.keys(d).map(Number).sort((a,b)=>a-b);console.log(\`  ${k.length}회 (${k[0]} ~ ${k[k.length-1]})\`)"
          echo ""
          echo "fetch-history.mjs 실행..."
          node scripts/fetch-history.mjs
          echo ""
          echo "갱신 후 회차:"
          node -e "const d=require('./assets/lotto-history.json');const k=Object.keys(d).map(Number).sort((a,b)=>a-b);console.log(\`  ${k.length}회 (${k[0]} ~ ${k[k.length-1]})\`)"

      - name: 변경분 자동 커밋 + 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            chore(lotto-app): 회차 데이터 자동 갱신

            GitHub Actions 자동 실행 (매주 토요일 KST 23:00)
          file_pattern: lotto-app/assets/lotto-history.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
