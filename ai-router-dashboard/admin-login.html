<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>spagenio - 관리자 로그인</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "맑은 고딕", "Segoe UI", sans-serif;
      background: #f4f5f7; color: #111827;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .logo-area { text-align: center; margin-bottom: 28px; }
    .logo-area .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .logo-area h1 { font-size: 1.6rem; font-weight: 900; color: #374151; letter-spacing: -0.5px; }
    .logo-area p { color: #6b7280; font-size: 0.85rem; margin-top: 6px; }
    .badge {
      display: inline-block; background: #fef3c7; border: 1px solid #fcd34d;
      color: #92400e; font-size: 0.78rem; font-weight: 700;
      padding: 3px 12px; border-radius: 999px; margin-top: 8px;
    }
    .box {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 14px;
      padding: 36px 40px 28px; width: 100%; max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .box-title {
      font-size: 0.95rem; font-weight: 700; color: #374151;
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }
    .form-group { margin-bottom: 14px; }
    input {
      width: 100%; border: 1.5px solid #e5e7eb; border-radius: 8px;
      padding: 13px 14px; font-size: 0.95rem; color: #111827;
      background: #fff; outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    input::placeholder { color: #9ca3af; }
    input:focus { border-color: #374151; box-shadow: 0 0 0 3px rgba(55,65,81,0.08); }
    .btn-login {
      width: 100%; background: #1f2937; color: #fff; border: none;
      border-radius: 8px; padding: 14px; font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: 4px; transition: background 0.15s;
    }
    .btn-login:hover { background: #111827; }
    .btn-login:disabled { background: #9ca3af; cursor: not-allowed; }
    .error-msg {
      background: #fff0f0; border: 1px solid #fecaca; border-radius: 8px;
      padding: 10px 14px; color: #dc2626; font-size: 0.88rem; margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }
    .back-link { text-align: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid #f3f4f6; }
    .back-link a { color: #6b7280; font-size: 0.87rem; text-decoration: none; }
    .back-link a:hover { color: #6366f1; }
    .footer { margin-top: 28px; text-align: center; color: #9ca3af; font-size: 0.76rem; }
  </style>
</head>
<body>
  <div class="logo-area">
    <div class="icon">⚙️</div>
    <h1>spagenio 관리자</h1>
    <p>관리자 전용 로그인 페이지입니다</p>
    <div class="badge">🔒 Admin Only</div>
  </div>

  <div class="box">
    <div class="box-title">🛡️ 관리자 인증</div>
    <div id="errorMsg" class="error-msg"></div>
    <form id="adminLoginForm">
      <div class="form-group">
        <input type="text" id="username" placeholder="관리자 아이디" autocomplete="username" required />
      </div>
      <div class="form-group">
        <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login" id="loginBtn">관리자 로그인</button>
    </form>
    <div class="back-link">
      <a href="/login">← 일반 로그인으로 돌아가기</a>
    </div>
  </div>
  <div class="footer">© 2026 spagenio. All rights reserved.</div>

  <script>
    // 이미 관리자 로그인된 경우
    const token = sessionStorage.getItem('admin_token');
    if (token) {
      fetch('/api/auth/verify', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => { if (r.ok) location.href = '/admin'; else sessionStorage.removeItem('admin_token'); })
        .catch(() => {});
    }

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = '인증 중...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          // 관리자 확인
          const verifyRes = await fetch('/api/auth/verify', {
            headers: { 'Authorization': 'Bearer ' + data.token }
          });
          const verifyData = await verifyRes.json();
          if (verifyData.user?.username === 'admin') {
            sessionStorage.setItem('auth_token', data.token);
            sessionStorage.setItem('admin_token', data.token);
            location.href = '/admin';
          } else {
            showError('관리자 계정이 아닙니다.');
          }
        } else {
          showError(data.error || '아이디 또는 비밀번호가 올바르지 않습니다.');
        }
      } catch(e) { showError('서버 연결 오류.'); }

      btn.disabled = false; btn.textContent = '관리자 로그인';
    });

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg; el.classList.add('show');
    }
  </script>
</body>
</html>
