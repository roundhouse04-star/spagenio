<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 변경 - AI Router Dashboard</title>
  <style>
    :root { --bg: #09111f; --panel: rgba(14,22,38,0.92); --text: #eef2ff; --muted: #9ea8c9; --line: #24314f; --accent: #76a5ff; --danger: #ff8f8f; --success: #7ef0bf; --warn: #ffc86e; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, rgba(118,165,255,0.12), transparent 30%),
                  linear-gradient(180deg, #09111f 0%, #0d1526 100%);
      color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .box { background: var(--panel); border: 1px solid var(--line); border-radius: 24px; padding: 40px; width: 100%; max-width: 460px; box-shadow: 0 24px 60px rgba(0,0,0,0.4); backdrop-filter: blur(12px); }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
    .logo p { color: var(--muted); font-size: 0.9rem; }
    .step { display: none; }
    .step.active { display: block; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-weight: 700; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
    .input-row { display: flex; gap: 8px; }
    input { width: 100%; background: #0d1526; border: 1px solid var(--line); border-radius: 12px; padding: 12px 16px; color: var(--text); font-size: 1rem; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: var(--accent); }
    .btn { width: 100%; background: var(--accent); color: #081121; border: none; border-radius: 12px; padding: 14px; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 8px; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm { background: var(--accent); color: #081121; border: none; border-radius: 10px; padding: 12px 16px; font-weight: 700; cursor: pointer; white-space: nowrap; font-size: 0.9rem; }
    .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { width: 100%; background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: 12px; padding: 12px; font-size: 0.95rem; cursor: pointer; margin-top: 10px; }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .msg { border-radius: 10px; padding: 10px 14px; font-size: 0.9rem; margin-bottom: 16px; display: none; }
    .msg.show { display: block; }
    .msg.error { background: rgba(255,143,143,0.1); border: 1px solid var(--danger); color: var(--danger); }
    .msg.success { background: rgba(126,240,191,0.1); border: 1px solid var(--success); color: var(--success); }
    .pw-checks { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .pw-check { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--muted); transition: color 0.15s; }
    .pw-check.pass { color: var(--success); }
    .pw-check.fail { color: var(--danger); }
    .pw-check .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); flex-shrink: 0; transition: background 0.15s; }
    .pw-check.pass .dot { background: var(--success); }
    .pw-check.fail .dot { background: var(--danger); }
    .pw-strength { margin-top: 10px; }
    .pw-strength-bar { height: 4px; border-radius: 4px; background: var(--line); overflow: hidden; margin-bottom: 4px; }
    .pw-strength-fill { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; width: 0; }
    .pw-strength-label { font-size: 0.8rem; color: var(--muted); }
    .timer { color: var(--warn); font-size: 0.85rem; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <h1>🔒 비밀번호 변경</h1>
      <p id="stepDesc">이메일로 인증코드를 받으세요</p>
    </div>
    <div id="msg" class="msg"></div>

    <div class="step active" id="step1">
      <p style="color:var(--muted);font-size:0.9rem;margin-bottom:20px;line-height:1.6;">등록된 이메일로 인증코드를 발송합니다.<br/>인증코드는 5분간 유효합니다.</p>
      <button class="btn" id="sendCodeBtn" onclick="sendCode()">인증코드 발송</button>
      <button class="btn-outline" onclick="location.href='/'">취소하고 돌아가기</button>
    </div>

    <div class="step" id="step2">
      <div class="form-group">
        <label>인증코드</label>
        <div class="input-row">
          <input type="text" id="verifyCode" placeholder="6자리 입력" maxlength="6" style="letter-spacing:4px;text-align:center;font-size:1.2rem;" />
          <button class="btn-sm" onclick="sendCode(true)" id="resendBtn">재발송</button>
        </div>
        <p class="timer" id="timer"></p>
      </div>
      <button class="btn" onclick="confirmCode()">인증 확인</button>
    </div>

    <div class="step" id="step3">
      <div class="form-group">
        <label>새 비밀번호</label>
        <input type="password" id="newPassword" placeholder="새 비밀번호 입력" oninput="checkStrength()" />
        <div class="pw-strength">
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="strengthFill"></div></div>
          <span class="pw-strength-label" id="strengthLabel"></span>
        </div>
        <div class="pw-checks">
          <div class="pw-check" id="chk-len"><div class="dot"></div>8자 이상</div>
          <div class="pw-check" id="chk-upper"><div class="dot"></div>대문자 포함 (A-Z)</div>
          <div class="pw-check" id="chk-lower"><div class="dot"></div>소문자 포함 (a-z)</div>
          <div class="pw-check" id="chk-num"><div class="dot"></div>숫자 포함 (0-9)</div>
          <div class="pw-check" id="chk-special"><div class="dot"></div>특수문자 포함 (!@#$ 등)</div>
        </div>
      </div>
      <div class="form-group">
        <label>새 비밀번호 확인</label>
        <input type="password" id="newPasswordConfirm" placeholder="새 비밀번호 재입력" oninput="checkConfirm()" />
        <p id="confirmMsg" style="font-size:0.85rem;margin-top:6px;"></p>
      </div>
      <button class="btn" id="changeBtn" onclick="changePassword()" disabled>비밀번호 변경</button>
    </div>
  </div>

  <script>
    const token = sessionStorage.getItem('auth_token');
    if (!token) location.href = '/login';
    let verifiedCode = '';
    let timerInterval = null;

    async function sendCode(resend = false) {
      const btn = resend ? document.getElementById('resendBtn') : document.getElementById('sendCodeBtn');
      btn.disabled = true;
      btn.textContent = '발송 중...';
      try {
        const res = await fetch('/api/auth/change-password/send-code', {
          method: 'POST', headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (res.ok) {
          showStep(2);
          showMsg('success', data.message);
          startTimer(300);
          if (resend) setTimeout(() => { btn.disabled = false; btn.textContent = '재발송'; }, 60000);
        } else {
          showMsg('error', data.error || '발송 실패');
          btn.disabled = false;
          btn.textContent = resend ? '재발송' : '인증코드 발송';
        }
      } catch (e) {
        showMsg('error', '서버 연결 오류');
        btn.disabled = false;
        btn.textContent = resend ? '재발송' : '인증코드 발송';
      }
    }

    function startTimer(sec) {
      if (timerInterval) clearInterval(timerInterval);
      const el = document.getElementById('timer');
      const update = () => {
        el.textContent = '남은 시간: ' + Math.floor(sec/60) + ':' + String(sec%60).padStart(2,'0');
        if (sec-- <= 0) { clearInterval(timerInterval); el.textContent = '만료됐습니다. 재발송해주세요.'; el.style.color = 'var(--danger)'; }
      };
      update();
      timerInterval = setInterval(update, 1000);
    }

    function confirmCode() {
      const code = document.getElementById('verifyCode').value.trim();
      if (code.length !== 6) { showMsg('error', '6자리 인증코드를 입력해주세요.'); return; }
      verifiedCode = code;
      showStep(3);
      showMsg('success', '인증됐습니다. 새 비밀번호를 설정해주세요.');
    }

    function checkStrength() {
      const pw = document.getElementById('newPassword').value;
      const c = { len: pw.length >= 8, upper: /[A-Z]/.test(pw), lower: /[a-z]/.test(pw), num: /[0-9]/.test(pw), special: /[!@#$%^&*()_+={}|;<>?]/.test(pw) };
      Object.entries(c).forEach(([k, v]) => {
        const el = document.getElementById('chk-' + k);
        if (el) el.className = 'pw-check ' + (v ? 'pass' : pw.length > 0 ? 'fail' : '');
      });
      const cnt = Object.values(c).filter(Boolean).length;
      const fill = document.getElementById('strengthFill');
      const lbl = document.getElementById('strengthLabel');
      fill.style.width = (cnt/5*100) + '%';
      if (cnt <= 2) { fill.style.background = 'var(--danger)'; lbl.textContent = '약함'; lbl.style.color = 'var(--danger)'; }
      else if (cnt <= 4) { fill.style.background = 'var(--warn)'; lbl.textContent = '보통'; lbl.style.color = 'var(--warn)'; }
      else { fill.style.background = 'var(--success)'; lbl.textContent = '강함'; lbl.style.color = 'var(--success)'; }
      checkConfirm();
    }

    function checkConfirm() {
      const pw = document.getElementById('newPassword').value;
      const cf = document.getElementById('newPasswordConfirm').value;
      const msg = document.getElementById('confirmMsg');
      if (!cf) { msg.textContent = ''; return; }
      if (pw === cf) { msg.textContent = '✅ 비밀번호가 일치합니다'; msg.style.color = 'var(--success)'; }
      else { msg.textContent = '❌ 비밀번호가 일치하지 않습니다'; msg.style.color = 'var(--danger)'; }
      const allPass = pw.length>=8 && /[A-Z]/.test(pw) && /[a-z]/.test(pw) && /[0-9]/.test(pw) && /[!@#$%^&*()_+={}|;<>?]/.test(pw);
      document.getElementById('changeBtn').disabled = !(allPass && pw === cf);
    }

    async function changePassword() {
      const newPassword = document.getElementById('newPassword').value;
      const btn = document.getElementById('changeBtn');
      btn.disabled = true; btn.textContent = '처리 중...';
      try {
        const res = await fetch('/api/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ verifyCode: verifiedCode, newPassword })
        });
        const data = await res.json();
        if (res.ok) {
          sessionStorage.removeItem('auth_token');
          showMsg('success', '✅ 비밀번호가 변경됐습니다. 3초 후 로그인 페이지로 이동합니다.');
          setTimeout(() => location.href = '/login', 3000);
        } else {
          showMsg('error', data.error || '변경 중 오류가 발생했습니다.');
          btn.disabled = false; btn.textContent = '비밀번호 변경';
        }
      } catch(e) {
        showMsg('error', '서버 연결 오류');
        btn.disabled = false; btn.textContent = '비밀번호 변경';
      }
    }

    function showStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + n).classList.add('active');
      const d = ['','이메일로 인증코드를 받으세요','인증코드를 입력해주세요','새 비밀번호를 설정하세요'];
      document.getElementById('stepDesc').textContent = d[n];
    }

    function showMsg(type, text) {
      const el = document.getElementById('msg');
      el.textContent = text; el.className = 'msg ' + type + ' show';
    }
  </script>
</body>
</html>
