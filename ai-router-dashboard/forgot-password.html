<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 찾기 - AI Router Dashboard</title>
  <style>
    :root { --bg: #09111f; --panel: rgba(14,22,38,0.92); --text: #eef2ff; --muted: #9ea8c9; --line: #24314f; --accent: #76a5ff; --danger: #ff8f8f; --success: #7ef0bf; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, rgba(118,165,255,0.12), transparent 30%),
                  linear-gradient(180deg, #09111f 0%, #0d1526 100%);
      color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .box {
      background: var(--panel); border: 1px solid var(--line); border-radius: 24px;
      padding: 40px; width: 100%; max-width: 440px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4); backdrop-filter: blur(12px);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
    .logo p { color: var(--muted); font-size: 0.9rem; line-height: 1.5; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-weight: 700; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
    input {
      width: 100%; background: #0d1526; border: 1px solid var(--line);
      border-radius: 12px; padding: 12px 16px; color: var(--text);
      font-size: 1rem; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; background: var(--accent); color: #081121;
      border: none; border-radius: 12px; padding: 14px;
      font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline {
      width: 100%; background: transparent; color: var(--muted);
      border: 1px solid var(--line); border-radius: 12px; padding: 12px;
      font-size: 0.95rem; cursor: pointer; margin-top: 10px;
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .msg { border-radius: 10px; padding: 12px 16px; font-size: 0.9rem; margin-bottom: 16px; display: none; line-height: 1.5; }
    .msg.show { display: block; }
    .msg.error { background: rgba(255,143,143,0.1); border: 1px solid var(--danger); color: var(--danger); }
    .msg.success { background: rgba(126,240,191,0.1); border: 1px solid var(--success); color: var(--success); }
    .divider { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line); }
    .divider a { color: var(--accent); font-weight: 700; font-size: 0.9rem; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <h1>🔑 비밀번호 찾기</h1>
      <p>아이디를 입력하면 관리자에게<br/>임시 비밀번호 발급을 요청합니다</p>
    </div>

    <div id="msg" class="msg"></div>

    <form id="forgotForm">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="username" placeholder="가입한 아이디 입력" required />
      </div>
      <button type="submit" class="btn" id="submitBtn">임시 비밀번호 요청</button>
      <button type="button" class="btn-outline" onclick="location.href='/login'">로그인으로 돌아가기</button>
    </form>

    <div class="divider">
      <p style="color:var(--muted);font-size:0.85rem;margin-bottom:8px;">관리자에게 요청 후 임시 비밀번호를 받으면<br/>로그인 후 비밀번호를 변경해주세요.</p>
    </div>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const btn = document.getElementById('submitBtn');

      btn.disabled = true;
      btn.textContent = '요청 중...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });
        const data = await res.json();

        showMsg('success', '✅ ' + data.message + '\n관리자가 임시 비밀번호를 발급하면 알려드립니다.');
        document.getElementById('forgotForm').style.display = 'none';
      } catch (e) {
        showMsg('error', '서버 연결 오류가 발생했습니다.');
        btn.disabled = false;
        btn.textContent = '임시 비밀번호 요청';
      }
    });

    function showMsg(type, text) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = `msg ${type} show`;
    }
  </script>
</body>
</html>
