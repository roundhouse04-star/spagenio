<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>spagenio - 로그인</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "맑은 고딕", "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo-area { text-align: center; margin-bottom: 28px; }
    .logo-area .icon { font-size: 3rem; margin-bottom: 10px; display: block; }
    .logo-area h1 { font-size: 2rem; font-weight: 900; color: #6366f1; letter-spacing: -1px; }
    .logo-area p { color: #6b7280; font-size: 0.88rem; margin-top: 6px; }
    .box {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 36px 40px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.08);
    }
    .form-group { margin-bottom: 14px; }
    input {
      width: 100%;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 13px 14px;
      font-size: 0.95rem;
      color: #111827;
      background: #ffffff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input::placeholder { color: #9ca3af; }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    .btn-login {
      width: 100%;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #4f46e5; }
    .btn-login:disabled { background: #c7d2fe; cursor: not-allowed; }
    .error-msg {
      background: #fff0f0;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      color: #dc2626;
      font-size: 0.88rem;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.show { display: block; }
    .attempts { text-align: center; color: #9ca3af; font-size: 0.8rem; margin-top: 8px; }
    .links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid #f3f4f6;
    }
    .links a { color: #6b7280; font-size: 0.88rem; text-decoration: none; }
    .links a:hover { color: #6366f1; }
    .links span { color: #e5e7eb; }
    .admin-link { text-align: center; margin-top: 12px; }
    .admin-link a { color: #9ca3af; font-size: 0.8rem; text-decoration: none; }
    .admin-link a:hover { color: #6366f1; }
    .footer { margin-top: 28px; text-align: center; color: #9ca3af; font-size: 0.76rem; }

    @media(max-width:480px) {
      .box { padding: 24px 18px 20px; margin: 10px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="logo-area">
    <span class="icon">🚀</span>
    <h1>spagenio</h1>
    <p>AI 기반 투자 & 자동화 대시보드</p>
  </div>
  <div class="box">
    <div id="errorMsg" class="error-msg"></div>
    <form id="loginForm">
      <div class="form-group">
        <input type="text" id="username" placeholder="아이디" autocomplete="username" required />
      </div>
      <div class="form-group">
        <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login" id="loginBtn">로그인</button>
    </form>
    <p class="attempts" id="attemptsMsg"></p>
    <div class="links">
      <a href="/forgot-password">비밀번호 찾기</a>
      <span>|</span>
      <a href="/terms">회원가입</a>
    </div>
    <div class="admin-link">
      <a href="/admin-login">관리자 로그인 →</a>
    </div>
  </div>
  <div class="footer">© 2026 spagenio. All rights reserved.</div>
  <script>
    // 이미 로그인된 경우 뒤로가기로 로그인 페이지 못 오게
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', () => history.pushState(null, '', location.href));

    const token = sessionStorage.getItem('auth_token');
    if (token) {
      fetch('/api/auth/verify', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => { if (r.ok) location.href = '/'; else sessionStorage.removeItem('auth_token'); })
        .catch(() => {});
    }
    let attempts = 0, lockUntil = null;
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (lockUntil && Date.now() < lockUntil) {
        showError('너무 많은 시도. ' + Math.ceil((lockUntil - Date.now()) / 1000) + '초 후 다시 시도하세요.');
        return;
      }
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = '로그인 중...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          sessionStorage.setItem('auth_token', data.token);
          location.href = '/';
        } else {
          attempts++;
          if (attempts >= 5) {
            lockUntil = Date.now() + 30000;
            showError('5회 실패. 30초 후 다시 시도하세요.');
          } else {
            showError(data.error || '아이디 또는 비밀번호가 올바르지 않습니다.');
            document.getElementById('attemptsMsg').textContent = '시도 ' + attempts + '/5';
          }
        }
      } catch(e) { showError('서버 연결 오류.'); }
      btn.disabled = false; btn.textContent = '로그인';
    });
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg; el.classList.add('show');
    }
  </script>
</body>
</html>
