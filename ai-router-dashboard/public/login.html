<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>spagenio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;0,900;1,300&family=DM+Serif+Display:ital@0;1&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #f5f0e8;
      --sand:    #e8dcc8;
      --warm:    #d4c4a8;
      --text:    #1a1a1a;
      --muted:   #6b6b6b;
      --accent:  #6366f1;
      --white:   #ffffff;
    }

    html, body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--white);
      color: var(--text);
      height: 100%;
      overflow: hidden;
    }



    /* ===== 메인 레이아웃 ===== */
    .main-layout {
      display: grid;
      grid-template-columns: 2.2fr 1fr;
      height: calc(100vh - 48px);
    }

    /* ===== 좌측: 이미지 + 타이포 ===== */
    .left-panel {
      position: relative;
      overflow: hidden;
      background: #000;
      height: 100%;
    }



    /* 큰 배경 타이포 */
    .bg-typo {
      position: absolute;
      bottom: -2%;
      left: -2%;
      font-family: 'DM Serif Display', serif;
      font-size: clamp(5rem, 12vw, 10rem);
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(255,255,255,0.06);
      line-height: 0.85;
      z-index: 2;
      pointer-events: none;
      letter-spacing: -4px;
    }

    /* ===== Right: text + login ===== */
    .right-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px 40px;
      background: var(--white);
      position: relative;
      height: 100%;
      overflow-y: auto;
    }

    .right-content {
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
    }




    /* ===== Login form ===== */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .login-divider span {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e5e5;
    }

    .form-group {
      margin-bottom: 8px;
      position: relative;
    }

    input {
      width: 100%;
      height: 44px;
      border: 1.5px solid #e5e5e5;
      border-radius: 4px;
      padding: 0 14px;
      font-size: 0.86rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: all .2s;
    }

    input::placeholder {
      color: #b0b0b0;
      font-weight: 300;
    }

    input:focus {
      border-color: var(--text);
      background: #fafafa;
    }

    .btn-login {
      width: 100%;
      height: 44px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.86rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 4px;
      letter-spacing: 0.5px;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '→';
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      transition: transform .2s;
    }

    .btn-login:hover {
      background: #2d2d2d;
    }

    .btn-login:hover::after {
      transform: translateY(-50%) translateX(4px);
    }

    .btn-login:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-left: 3px solid #fc8181;
      border-radius: 4px;
      padding: 10px 14px;
      color: #c53030;
      font-size: 0.82rem;
      margin-bottom: 14px;
      display: none;
    }

    .error-msg.show { display: block; }

    .attempts {
      text-align: center;
      color: #b0b0b0;
      font-size: 0.76rem;
      margin-top: 8px;
    }

    .form-links {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
    }

    .form-links a {
      color: var(--muted);
      font-size: 0.8rem;
      text-decoration: none;
      transition: color .15s;
      position: relative;
    }

    .form-links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--text);
      transition: width .2s;
    }

    .form-links a:hover { color: var(--text); }
    .form-links a:hover::after { width: 100%; }



    /* ===== 반응형 ===== */
    @media(max-width: 900px) {
      .main-layout { grid-template-columns: 1fr; }
      .left-panel { min-height: 45vh; }
      .right-panel { padding: 40px 28px 36px; }
      .right-content { max-width: 100%; }
      .nav { padding: 0 20px; }
      .nav-center { display: none; }
      .stats-bar { grid-template-columns: 1fr; }
      .stat-item { border-right: none; border-bottom: 1px solid #ebebeb; padding: 20px 28px; }
    }
  </style>
</head>

    <div class="right-panel">
      <div class="right-content">



        <div class="login-divider">
          <span>Sign in</span>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <form id="loginForm">
          <div class="form-group">
            <input type="text" id="username" placeholder="Username" autocomplete="username" required />
          </div>
          <div class="form-group">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn-login" id="loginBtn">Sign in</button>
        </form>

        <p class="attempts" id="attemptsMsg"></p>

  </div><!-- /.main-layout -->

  <script>
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', () => history.pushState(null, '', location.href));

    const token = sessionStorage.getItem('auth_token');
    if (token) {
      fetch('/api/auth/verify', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => { if (r.ok) location.href = '/'; else sessionStorage.removeItem('auth_token'); })
        .catch(() => {});
    }

    let attempts = 0, lockUntil = null;

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (lockUntil && Date.now() < lockUntil) {
        showError('Too many attempts. Try again in ' + Math.ceil((lockUntil - Date.now()) / 1000) + 's.');
        return;
      }
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = '...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          if (data.username === 'admin') {
            showError('Admin accounts must use the admin login page.');
            btn.disabled = false; btn.textContent = 'Sign in';
            return;
          }
          sessionStorage.setItem('auth_token', data.token);
          location.href = '/';
        } else {
          attempts++;
          if (attempts >= 5) {
            lockUntil = Date.now() + 30000;
            showError('5 failed attempts. Try again in 30s.');
          } else {
            showError(data.error || 'Invalid username or password.');
            document.getElementById('attemptsMsg').textContent = 'Attempt ' + attempts + ' of 5';
          }
        }
      } catch(e) { showError('Server connection error.'); }
      btn.disabled = false; btn.textContent = 'Sign in';
    });

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }
  </script>
</body>
</html>
