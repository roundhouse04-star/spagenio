<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triplive — 여행 기록</title>
<meta name="description" content="Triplive — 여행 일정, 비용, 영수증 OCR을 한 곳에 담는 여행 기록 앱">
<style>
  :root {
    --bg: #F5EFE4;
    --surface: #ffffff;
    --text-primary: #1E2A3A;
    --text-secondary: #5a6573;
    --accent: #c8a24e;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                 "Helvetica Neue", "Arial", sans-serif;
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 16px;
  }
  .container {
    max-width: 640px; text-align: center;
    background: var(--surface); padding: 64px 32px;
    border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  }
  .logo-box {
    width: 120px; height: 120px; margin: 0 auto 24px;
    background: var(--text-primary); border-radius: 28px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(30,42,58,0.25);
  }
  .logo-t {
    font-size: 80px; font-weight: 700;
    color: var(--bg); font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    letter-spacing: -2px;
  }
  .brand-name { font-size: 36px; font-weight: 700; margin-bottom: 8px; letter-spacing: -1px; }
  .tagline { font-size: 16px; color: var(--text-secondary); margin-bottom: 32px; }
  .features {
    text-align: left; max-width: 480px; margin: 0 auto 40px;
    background: var(--bg); padding: 24px; border-radius: 12px;
  }
  .feature { padding: 8px 0; color: var(--text-primary); font-size: 15px; }
  .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .link {
    color: var(--accent); text-decoration: none; font-weight: 600;
    padding: 12px 24px; border: 1.5px solid var(--accent); border-radius: 999px;
    transition: all 0.2s;
  }
  .link:hover { background: var(--accent); color: white; }
  .footer {
    margin-top: 48px; color: var(--text-secondary); font-size: 13px;
  }
  .footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <div class="logo-box"><span class="logo-t">T</span></div>
  <h1 class="brand-name">Triplive</h1>
  <p class="tagline">여행의 모든 순간을 한 권의 책으로</p>

  <div class="features">
    <div class="feature">📔 여행 일정 · 비용 · 체크리스트</div>
    <div class="feature">💰 영수증/티켓 자동 OCR 인식</div>
    <div class="feature">🌍 46개 도시 추천 명소</div>
    <div class="feature">📊 여행 통계 · PDF 회고</div>
    <div class="feature">🔒 모든 데이터 기기에만 저장</div>
  </div>

  <div class="links">
    <a class="link" href="privacy.html">개인정보처리방침</a>
    <a class="link" href="terms.html">이용약관</a>
  </div>

  <div class="footer">
    © 2026 Spagenio<br>
    문의: <a href="mailto:roundhouse04@gmail.com">roundhouse04@gmail.com</a>
  </div>
</div>
</body>
</html>
