<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 변경 - Travellog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6f8; color: #1a1a2e;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
    }
    .logo-area { text-align: center; margin-bottom: 24px; }
    .logo-area h1 { font-size: 1.8rem; font-weight: 900; color: #4f46e5; letter-spacing: -1px; }
    .box {
      background: white; border: 1px solid #eee; border-radius: 20px;
      padding: 36px; width: 100%; max-width: 440px;
      box-shadow: 0 4px 20px rgba(79,70,229,0.08);
    }
    .step { display: none; }
    .step.active { display: block; }
    .step-title { font-size: 1.1rem; font-weight: 800; color: #1a1a2e; margin-bottom: 6px; }
    .step-desc { font-size: 0.87rem; color: #6b7280; margin-bottom: 24px; line-height: 1.6; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 700; font-size: 0.83rem; color: #555; margin-bottom: 7px; }
    input {
      width: 100%; background: white; border: 1px solid #e5e7eb;
      border-radius: 12px; padding: 12px 16px; color: #1a1a2e;
      font-size: 0.95rem; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #6366f1; }
    .input-row { display: flex; gap: 8px; }
    .input-row input { flex: 1; }
    .code-input { letter-spacing: 6px; text-align: center; font-size: 1.4rem; font-weight: 700; }
    .timer { font-size: 0.82rem; color: #f59e0b; margin-top: 6px; font-weight: 600; }
    .timer.expired { color: #ef4444; }
    .pw-strength-bar { height: 4px; border-radius: 4px; background: #e5e7eb; overflow: hidden; margin-top: 8px; }
    .pw-strength-fill { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; width: 0; }
    .pw-checks { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .pw-check { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #9ca3af; }
    .pw-check.pass { color: #10b981; }
    .pw-check .dot { width: 6px; height: 6px; border-radius: 50%; background: #e5e7eb; flex-shrink: 0; }
    .pw-check.pass .dot { background: #10b981; }
    .input-hint { font-size: 0.78rem; margin-top: 5px; }
    .input-hint.error { color: #ef4444; }
    .input-hint.success { color: #10b981; }
    .btn-primary {
      width: 100%; background: #4f46e5; color: white; border: none;
      border-radius: 12px; padding: 14px; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s; margin-top: 8px;
    }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #c7d2fe; cursor: not-allowed; }
    .btn-sm {
      background: #eef2ff; color: #4f46e5; border: 1px solid #c7d2fe;
      border-radius: 10px; padding: 12px 14px; font-weight: 700;
      cursor: pointer; white-space: nowrap; font-size: 0.85rem; flex-shrink: 0;
    }
    .btn-sm:hover { background: #e0e7ff; }
    .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline {
      width: 100%; background: white; color: #6b7280;
      border: 1px solid #eee; border-radius: 12px; padding: 12px;
      font-size: 0.9rem; cursor: pointer; margin-top: 8px; transition: all 0.15s;
    }
    .btn-outline:hover { border-color: #4f46e5; color: #4f46e5; }
    .msg { border-radius: 10px; padding: 10px 14px; font-size: 0.88rem; margin-bottom: 16px; display: none; }
    .msg.show { display: block; }
    .msg.error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
    .msg.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }
    .footer { margin-top: 20px; text-align: center; color: #9ca3af; font-size: 0.75rem; }
    @media (max-width: 480px) {
      .box { padding: 28px 20px; }
      .pw-checks { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="logo-area">
    <h1>✈ Travellog</h1>
  </div>

  <div class="box">
    <div id="msg" class="msg"></div>

    <!-- STEP 1: 인증코드 발송 -->
    <div class="step active" id="step1">
      <div class="step-title">🔒 비밀번호 변경</div>
      <div class="step-desc">보안을 위해 등록된 이메일로 인증코드를 발송합니다.<br>인증코드는 5분간 유효합니다.</div>
      <button class="btn-primary" id="sendBtn" onclick="sendCode()">인증코드 발송</button>
      <button class="btn-outline" onclick="location.href='/'">취소하고 돌아가기</button>
    </div>

    <!-- STEP 2: 인증코드 입력 -->
    <div class="step" id="step2">
      <div class="step-title">📧 인증코드 입력</div>
      <div class="step-desc">이메일로 발송된 6자리 인증코드를 입력해주세요.</div>
      <div class="form-group">
        <label>인증코드</label>
        <div class="input-row">
          <input type="text" id="verifyCode" class="code-input" placeholder="000000"
            maxlength="6" oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
          <button class="btn-sm" id="resendBtn" onclick="sendCode(true)">재발송</button>
        </div>
        <div class="timer" id="timer"></div>
      </div>
      <button class="btn-primary" onclick="confirmCode()">인증 확인</button>
    </div>

    <!-- STEP 3: 새 비밀번호 -->
    <div class="step" id="step3">
      <div class="step-title">🔑 새 비밀번호 설정</div>
      <div class="step-desc">새로운 비밀번호를 입력해주세요.</div>
      <div class="form-group">
        <label>새 비밀번호</label>
        <input type="password" id="newPassword" placeholder="새 비밀번호 입력" oninput="checkStrength()" />
        <div class="pw-strength-bar"><div class="pw-strength-fill" id="strengthFill"></div></div>
        <div class="pw-checks">
          <div class="pw-check" id="chk-len"><div class="dot"></div>8자 이상</div>
          <div class="pw-check" id="chk-upper"><div class="dot"></div>대문자 포함</div>
          <div class="pw-check" id="chk-lower"><div class="dot"></div>소문자 포함</div>
          <div class="pw-check" id="chk-num"><div class="dot"></div>숫자 포함</div>
        </div>
      </div>
      <div class="form-group">
        <label>새 비밀번호 확인</label>
        <input type="password" id="newPasswordConfirm" placeholder="새 비밀번호 재입력" oninput="checkConfirm()" />
        <div class="input-hint" id="confirmHint"></div>
      </div>
      <button class="btn-primary" id="changeBtn" onclick="changePassword()" disabled>비밀번호 변경</button>
    </div>

    <!-- STEP 4: 완료 -->
    <div class="step" id="step4">
      <div style="text-align:center; padding: 20px 0;">
        <div style="font-size:3rem; margin-bottom:16px;">✅</div>
        <div class="step-title" style="margin-bottom:10px;">비밀번호가 변경됐습니다!</div>
        <div class="step-desc" style="margin-bottom:28px;">새 비밀번호로 다시 로그인해주세요.</div>
        <button class="btn-primary" onclick="location.href='/login'">로그인하러 가기</button>
      </div>
    </div>
  </div>

  <div class="footer">© 2026 Travellog. All rights reserved.</div>

  <script>
    const token = sessionStorage.getItem('auth_token');
    if (!token) location.href = '/login';

    let timerInterval = null;
    let verifiedCode = '';

    async function sendCode(resend = false) {
      const btn = resend ? document.getElementById('resendBtn') : document.getElementById('sendBtn');
      btn.disabled = true;
      btn.textContent = '발송 중...';
      try {
        const res = await fetch('/api/auth/change-password/send-code', {
          method: 'POST', headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (res.ok) {
          goStep(2);
          startTimer(300);
          showMsg('success', '인증코드가 발송됐습니다. 이메일을 확인해주세요.');
          if (resend) setTimeout(() => { btn.disabled = false; btn.textContent = '재발송'; }, 60000);
        } else {
          showMsg('error', data.error || '발송에 실패했습니다.');
          btn.disabled = false;
          btn.textContent = resend ? '재발송' : '인증코드 발송';
        }
      } catch (e) {
        showMsg('error', '서버 연결 오류');
        btn.disabled = false;
        btn.textContent = resend ? '재발송' : '인증코드 발송';
      }
    }

    function confirmCode() {
      const code = document.getElementById('verifyCode').value.trim();
      if (code.length !== 6) { showMsg('error', '6자리 인증코드를 입력해주세요.'); return; }
      verifiedCode = code;
      if (timerInterval) clearInterval(timerInterval);
      goStep(3);
      showMsg('success', '인증됐습니다. 새 비밀번호를 설정해주세요.');
    }

    function checkStrength() {
      const pw = document.getElementById('newPassword').value;
      const c = { len: pw.length >= 8, upper: /[A-Z]/.test(pw), lower: /[a-z]/.test(pw), num: /[0-9]/.test(pw) };
      Object.entries(c).forEach(([k, v]) => {
        const el = document.getElementById('chk-' + k);
        if (el) el.className = 'pw-check' + (v ? ' pass' : '');
      });
      const cnt = Object.values(c).filter(Boolean).length;
      const fill = document.getElementById('strengthFill');
      fill.style.width = (cnt / 4 * 100) + '%';
      fill.style.background = cnt <= 1 ? '#ef4444' : cnt <= 3 ? '#f59e0b' : '#10b981';
      checkConfirm();
    }

    function checkConfirm() {
      const pw = document.getElementById('newPassword').value;
      const cf = document.getElementById('newPasswordConfirm').value;
      const hint = document.getElementById('confirmHint');
      if (!cf) { hint.textContent = ''; updateBtn(); return; }
      if (pw === cf) {
        hint.textContent = '✓ 비밀번호가 일치합니다';
        hint.className = 'input-hint success';
      } else {
        hint.textContent = '비밀번호가 일치하지 않습니다';
        hint.className = 'input-hint error';
      }
      updateBtn();
    }

    function updateBtn() {
      const pw = document.getElementById('newPassword').value;
      const cf = document.getElementById('newPasswordConfirm').value;
      const ok = pw.length >= 8 && /[A-Z]/.test(pw) && /[a-z]/.test(pw) && /[0-9]/.test(pw) && pw === cf;
      document.getElementById('changeBtn').disabled = !ok;
    }

    async function changePassword() {
      const newPassword = document.getElementById('newPassword').value;
      const btn = document.getElementById('changeBtn');
      btn.disabled = true; btn.textContent = '처리 중...';
      try {
        const res = await fetch('/api/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ verifyCode: verifiedCode, newPassword })
        });
        const data = await res.json();
        if (res.ok) {
          sessionStorage.removeItem('auth_token');
          goStep(4);
        } else {
          showMsg('error', data.error || '변경 중 오류가 발생했습니다.');
          btn.disabled = false; btn.textContent = '비밀번호 변경';
        }
      } catch (e) {
        showMsg('error', '서버 연결 오류');
        btn.disabled = false; btn.textContent = '비밀번호 변경';
      }
    }

    function startTimer(sec) {
      if (timerInterval) clearInterval(timerInterval);
      const el = document.getElementById('timer');
      el.className = 'timer';
      const update = () => {
        el.textContent = `남은 시간: ${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;
        if (sec-- <= 0) { clearInterval(timerInterval); el.textContent = '만료됐습니다. 재발송해주세요.'; el.className = 'timer expired'; }
      };
      update(); timerInterval = setInterval(update, 1000);
    }

    function goStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + n).classList.add('active');
      clearMsg();
    }
    function showMsg(type, text) { const el = document.getElementById('msg'); el.textContent = text; el.className = 'msg ' + type + ' show'; }
    function clearMsg() { document.getElementById('msg').className = 'msg'; }
  </script>
</body>
</html>
