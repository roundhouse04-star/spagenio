<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원 탈퇴 - Travellog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6f8; color: #1a1a2e;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
    }
    .logo-area { text-align: center; margin-bottom: 24px; }
    .logo-area h1 { font-size: 1.8rem; font-weight: 900; color: #4f46e5; letter-spacing: -1px; }
    .box {
      background: white; border: 1px solid #eee; border-radius: 20px;
      padding: 36px; width: 100%; max-width: 440px;
      box-shadow: 0 4px 20px rgba(79,70,229,0.08);
    }
    .box-icon { font-size: 2.5rem; text-align: center; margin-bottom: 12px; }
    .box-title { font-size: 1.1rem; font-weight: 800; color: #1a1a2e; margin-bottom: 20px; text-align: center; }
    .warning-box {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 12px; padding: 16px; margin-bottom: 24px;
    }
    .warning-title { font-size: 0.88rem; font-weight: 700; color: #dc2626; margin-bottom: 8px; }
    .warning-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .warning-list li { font-size: 0.85rem; color: #ef4444; display: flex; gap: 8px; line-height: 1.5; }
    .warning-list li::before { content: '·'; flex-shrink: 0; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 700; font-size: 0.83rem; color: #555; margin-bottom: 7px; }
    input {
      width: 100%; background: white; border: 1px solid #e5e7eb;
      border-radius: 12px; padding: 12px 16px; color: #1a1a2e;
      font-size: 0.95rem; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #ef4444; }
    .check-group { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; }
    .check-group input[type="checkbox"] { width: 18px; height: 18px; accent-color: #ef4444; cursor: pointer; flex-shrink: 0; margin-top: 2px; }
    .check-group label { font-size: 0.88rem; color: #555; cursor: pointer; line-height: 1.5; }
    .btn-danger {
      width: 100%; background: #ef4444; color: white;
      border: none; border-radius: 12px; padding: 14px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 4px; transition: background 0.15s;
    }
    .btn-danger:hover { background: #dc2626; }
    .btn-danger:disabled { background: #fca5a5; cursor: not-allowed; }
    .btn-outline {
      width: 100%; background: white; color: #6b7280;
      border: 1px solid #eee; border-radius: 12px; padding: 12px;
      font-size: 0.9rem; cursor: pointer; margin-top: 8px; transition: all 0.15s;
    }
    .btn-outline:hover { border-color: #4f46e5; color: #4f46e5; }
    .msg { border-radius: 10px; padding: 10px 14px; font-size: 0.88rem; margin-bottom: 16px; display: none; }
    .msg.show { display: block; }
    .msg.error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
    .footer { margin-top: 20px; text-align: center; color: #9ca3af; font-size: 0.75rem; }
    @media (max-width: 480px) { .box { padding: 28px 20px; } }
  </style>
</head>
<body>
  <div class="logo-area">
    <h1>✈ Travellog</h1>
  </div>

  <div class="box">
    <div class="box-icon">⚠️</div>
    <div class="box-title">회원 탈퇴</div>

    <div class="warning-box">
      <div class="warning-title">탈퇴 전 꼭 확인해주세요</div>
      <ul class="warning-list">
        <li>탈퇴 시 계정 정보가 즉시 삭제되며 복구할 수 없습니다.</li>
        <li>작성한 게시물, 댓글, 좋아요 기록이 모두 삭제됩니다.</li>
        <li>저장한 여행 일정 플래너 데이터가 삭제됩니다.</li>
        <li>탈퇴 후 동일한 이메일로 재가입이 가능합니다.</li>
      </ul>
    </div>

    <div id="errorMsg" class="msg error"></div>

    <form id="withdrawForm">
      <div class="form-group">
        <label>비밀번호 확인</label>
        <input type="password" id="password" placeholder="현재 비밀번호 입력" required />
      </div>
      <div class="check-group">
        <input type="checkbox" id="confirmCheck" onchange="toggleBtn()" />
        <label for="confirmCheck">위 내용을 모두 확인했으며, 계정 탈퇴에 동의합니다.</label>
      </div>
      <button type="submit" class="btn-danger" id="withdrawBtn" disabled>탈퇴하기</button>
      <button type="button" class="btn-outline" onclick="location.href='/'">취소하고 돌아가기</button>
    </form>
  </div>

  <div class="footer">© 2026 Travellog. All rights reserved.</div>

  <script>
    const token = sessionStorage.getItem('auth_token');
    if (!token) location.href = '/login';

    function toggleBtn() {
      document.getElementById('withdrawBtn').disabled = !document.getElementById('confirmCheck').checked;
    }

    document.getElementById('withdrawForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      if (!password) { showError('비밀번호를 입력해주세요.'); return; }
      if (!confirm('정말로 탈퇴하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;

      const btn = document.getElementById('withdrawBtn');
      btn.disabled = true;
      btn.textContent = '처리 중...';

      try {
        const res = await fetch('/api/auth/withdraw', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ password })
        });
        const data = await res.json();

        if (res.ok) {
          sessionStorage.removeItem('auth_token');
          alert('탈퇴가 완료됐습니다. 이용해주셔서 감사합니다.');
          location.href = '/login';
        } else {
          showError(data.error || '탈퇴 처리 중 오류가 발생했습니다.');
          btn.disabled = false;
          btn.textContent = '탈퇴하기';
        }
      } catch (e) {
        showError('서버 연결 오류가 발생했습니다.');
        btn.disabled = false;
        btn.textContent = '탈퇴하기';
      }
    });

    function showError(text) {
      const el = document.getElementById('errorMsg');
      el.textContent = text;
      el.classList.add('show');
    }
  </script>
</body>
</html>
