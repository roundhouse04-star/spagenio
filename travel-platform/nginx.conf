server {
    listen 80;
    server_name spagenio.com www.spagenio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name spagenio.com www.spagenio.com;

    ssl_certificate     /etc/letsencrypt/live/spagenio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spagenio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── /travel → travel-platform ──────────────────────
    location /travel {
        proxy_pass         http://localhost:4173/travel;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /travel/api/ {
        proxy_pass       http://localhost:9080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /travel/python/ {
        proxy_pass       http://localhost:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── /ai → ai-router-dashboard ──────────────────────
    location /ai {
        proxy_pass         http://localhost:5174/ai;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ai Node.js 백엔드 (server.js, port 3000)
    location /ai/api/ {
        proxy_pass       http://localhost:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── 퀀트/주식 프록시 → server.js 경유 ──────────────
    # (외부에서 /proxy/* 접근 → server.js가 내부 5001/5002로 중계)
    location /proxy/ {
        proxy_pass       http://localhost:3000/proxy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── 루트 → /travel 리다이렉트 ──────────────────────
    location = / {
        return 302 /travel;
    }
}
