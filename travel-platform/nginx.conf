server {
    listen 80;
    server_name spagenio.com www.spagenio.com travel.spagenio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name spagenio.com www.spagenio.com travel.spagenio.com;

    ssl_certificate     /etc/letsencrypt/live/spagenio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spagenio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # travel API must be matched BEFORE the generic /travel frontend route.
    location ^~ /travel/api/ {
        proxy_pass         http://127.0.0.1:19080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ^~ /travel/python/ {
        proxy_pass         http://127.0.0.1:9001/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend dev server / SPA
    location /travel/ {
        proxy_pass         http://127.0.0.1:4173/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location = /travel {
        return 301 /travel/;
    }

    location /ai/api/ {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /ai {
        proxy_pass         http://127.0.0.1:5174/ai;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /proxy/ {
        proxy_pass         http://127.0.0.1:3000/proxy/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location = / {
        return 302 /travel/;
    }
}
